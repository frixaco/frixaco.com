<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="<!--META_DESCRIPTION-->" />
    <link id="favicon" rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&display=swap" /></noscript>
    <title><!--PAGE_TITLE--></title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
      }
      p {
        text-wrap: pretty;
      }
      h1, h2, h3, h4, h5, h6 {
        overflow-wrap: break-word;
        text-wrap: balance;
      }
      img, svg {
        display: block;
        max-width: 100%;
      }

      /* --- palette --- */
      :root {
        --bg: #fdfdfc;
        --fg: #1a1a1a;
        --m: #888;
        --border: #e0e0e0;
        --sel-bg: #1a1a1a;
        --sel-fg: #fdfdfc;
      }
      @media (prefers-color-scheme: dark) {
        :root:not(.light) {
          --bg: #111;
          --fg: #e0e0e0;
          --m: #666;
          --border: #2a2a2a;
          --sel-bg: #e0e0e0;
          --sel-fg: #111;
        }
      }
      :root.dark {
        --bg: #111;
        --fg: #e0e0e0;
        --m: #666;
        --border: #2a2a2a;
        --sel-bg: #e0e0e0;
        --sel-fg: #111;
      }

      /* --- selection --- */
      ::selection {
        background: var(--sel-bg);
        color: var(--sel-fg);
      }
      ::-moz-selection {
        background: var(--sel-bg);
        color: var(--sel-fg);
      }

      html {
        overscroll-behavior: none;
      }
      body {
        -webkit-font-smoothing: antialiased;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.8 'Geist Mono', ui-monospace, monospace;
        max-width: 640px;
        min-height: 100vh;
        padding: 0 24px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
      }

      /* --- header --- */
      #header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 24px 0 16px;
        z-index: 1;
        background: var(--bg);
        position: sticky;
        top: 0;
      }
      #header nav {
        display: contents;
      }
      #theme-toggle {
        all: unset;
        margin-left: auto;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 1.5px solid var(--fg);
        cursor: pointer;
        transition: background 0.15s;
      }
      #theme-toggle:hover {
        background: var(--fg);
      }
      #header nav a {
        all: unset;
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: lowercase;
        color: var(--m);
        cursor: pointer;
        transition: color 0.15s;
      }
      #header nav a:hover,
      #header nav a.active {
        color: var(--fg);
      }
      #header nav a + a::before {
        content: '/';
        color: var(--border);
        margin-right: 8px;
      }

      /* --- footer --- */
      #footer {
        display: flex;
        padding: 48px 0 24px;
        justify-content: flex-end;
      }
      #footer span {
        font-size: 11px;
        color: var(--m);
        letter-spacing: 0.03em;
      }

      /* --- main content --- */
      #wrapper {
        flex: 1;
        padding-top: 16px;
      }

      /* headings */
      #wrapper h2 {
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--m);
        padding: 2em 0 0.6em;
        border-bottom: 1px solid var(--border);
        margin-bottom: 0.8em;
      }
      #wrapper h3 {
        font-size: 14px;
        font-weight: 500;
        padding: 0.6em 0 0.15em;
      }
      #wrapper h4,
      #wrapper h5,
      #wrapper h6 {
        font-size: 12px;
        font-weight: 500;
        color: var(--m);
        padding: 0.4em 0 0.1em;
        text-transform: lowercase;
      }

      /* paragraph */
      #wrapper p {
        padding-bottom: 0.7em;
        font-weight: 300;
      }

      /* tech tags — rendered as <strong> */
      #wrapper p > strong {
        font-weight: 400;
        font-size: 11px;
        letter-spacing: 0.04em;
        color: var(--m);
        border: 1px solid var(--border);
        padding: 1px 6px;
        border-radius: 2px;
      }

      /* blog date — rendered as <code> inside <p> */
      #wrapper p > code {
        background: none;
        color: var(--m);
        font-size: 12px;
        font-weight: 400;
        padding: 0;
        letter-spacing: 0.02em;
      }

      /* lists */
      #wrapper ul,
      #wrapper ol {
        padding: 0 0 0.7em 1.2em;
        font-weight: 300;
      }
      #wrapper li {
        padding-bottom: 0.25em;
      }
      #wrapper li::marker {
        color: var(--border);
      }

      /* links */
      #wrapper a {
        color: var(--fg);
        text-decoration: none;
        border-bottom: 1px solid var(--border);
        transition: border-color 0.15s;
      }
      #wrapper a:hover {
        border-color: var(--fg);
      }

      /* hr */
      #wrapper hr {
        border: none;
        border-bottom: 1px solid var(--border);
        margin: 1.6em 0;
      }

      /* blockquote */
      #wrapper blockquote {
        border-left: 2px solid var(--border);
        padding: 0.4em 0 0.4em 1em;
        margin: 0.8em 0;
      }
      #wrapper blockquote p {
        color: var(--m);
        font-style: italic;
      }

      /* code blocks */
      #wrapper pre {
        background: var(--fg);
        color: var(--bg);
        padding: 1em;
        overflow-x: auto;
        margin: 0.6em 0;
        border-radius: 2px;
        font-size: 13px;
        line-height: 1.6;
      }
      #wrapper pre code {
        background: none;
        color: inherit;
        padding: 0;
        font-size: inherit;
        border: none;
      }
      /* inline code (not date codes) */
      #wrapper code {
        background: var(--fg);
        color: var(--bg);
        padding: 0.1em 0.4em;
        font-size: 0.9em;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <header id="header">
      <nav>
        <a href="/">Home</a>
        <a href="/blog">blog</a>
        <a href="/more">about</a>
      </nav>
      <button id="theme-toggle" aria-label="Toggle theme"></button>
    </header>

    <main id="wrapper">
      <!--CONTENT-->
    </main>

    <footer id="footer">
      <span id="last-updated"><!--LAST_UPDATED--></span>
    </footer>

    <script type="module">
      const wrapper = document.getElementById("wrapper");
      const favicon = document.getElementById("favicon");

      function faviconHref(fill) {
        return `data:image/svg+xml,${encodeURIComponent(
          `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="32" r="20" fill="${fill}"/></svg>`,
        )}`;
      }

      function syncFavicon() {
        const fill = getComputedStyle(document.documentElement)
          .getPropertyValue("--fg")
          .trim();
        favicon.href = faviconHref(fill);
      }

      (function initTheme() {
        const saved = localStorage.getItem("theme");
        if (saved) document.documentElement.classList.add(saved);
        syncFavicon();
      })();

      document.getElementById("theme-toggle").addEventListener("click", () => {
        const root = document.documentElement;
        const isDark =
          root.classList.contains("dark") ||
          (!root.classList.contains("light") &&
            matchMedia("(prefers-color-scheme: dark)").matches);
        root.classList.remove("dark", "light");
        const next = isDark ? "light" : "dark";
        root.classList.add(next);
        localStorage.setItem("theme", next);
        syncFavicon();
      });

      function setActiveNav(path) {
        document.querySelectorAll("#header nav a").forEach((a) => {
          const href = a.getAttribute("href");
          const isActive =
            href === path || (href === "/blog" && path.startsWith("/blog/"));
          a.classList.toggle("active", isActive);
        });
      }
      let pathname = window.location.pathname;
      setActiveNav(pathname);
      let pages = {
        "/": undefined,
        "/blog": undefined,
        "/more": undefined,
      };
      pages[pathname] = wrapper.innerHTML;

      for (const [path, val] of Object.entries(pages)) {
        if (val !== undefined) continue;
        const mdPath = path === "/" ? "/md/home" : "/md" + path;
        fetch(mdPath)
          .then((d) => d.text())
          .then((html) => {
            pages[path] = html;
          });
      }

      function mdPath(path) {
        return path === "/" ? "/md/home" : "/md" + path;
      }

      function render(path, { push } = {}) {
        if (pages[path] !== undefined) {
          wrapper.innerHTML = pages[path];
          if (push) history.pushState(null, "", path);
          return;
        }

        fetch(mdPath(path))
          .then((d) => d.text())
          .then((html) => {
            pages[path] = html;
            wrapper.innerHTML = html;
            if (push) history.pushState(null, "", path);
          });
      }

      function navigate(path, { push = true, scrollTop = true } = {}) {
        setActiveNav(path);
        if (scrollTop) window.scrollTo(0, 0);
        render(path, { push });
      }

      document.getElementById("header").addEventListener("click", (e) => {
        const a = e.target.closest("a");
        if (!a) return;
        e.preventDefault();
        navigate(a.getAttribute("href"));
      });



      window.addEventListener("popstate", () => {
        const path = window.location.pathname;
        navigate(path, { push: false, scrollTop: false });
      });

      wrapper.addEventListener("click", (e) => {
        const a = e.target.closest("a");
        if (!a) return;
        const href = a.getAttribute("href");
        if (!href) return;
        if (href !== "/blog" && !href.startsWith("/blog/")) return;
        e.preventDefault();
        navigate(href);
      });
    </script>
  </body>
</html>
