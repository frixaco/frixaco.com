<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="<!--META_DESCRIPTION-->" />
    <link id="favicon" rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&display=swap" /></noscript>
    <title><!--PAGE_TITLE--></title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
      }
      p {
        text-wrap: pretty;
      }
      h1, h2, h3, h4, h5, h6 {
        overflow-wrap: break-word;
        text-wrap: balance;
      }
      img, svg {
        display: block;
        max-width: 100%;
      }

      :root {
        --bg: #f3f3f2;
        --surface: #ffffff;
        --fg: #111111;
        --muted: #8a8f98;
        --border: #d9d9d6;
        --accent: #ff5d30;
        --accent-hover: #c7441f;
        --mark: #333333;
        --sel-bg: #111111;
        --sel-fg: #f3f3f2;
      }
      @media (prefers-color-scheme: dark) {
        :root:not(.light) {
          --bg: #0b1215;
          --surface: #020d19;
          --fg: #efefef;
          --muted: #99a1af;
          --border: #efefef;
          --accent-hover: #ff8a63;
          --mark: #efefef;
          --sel-bg: #efefef;
          --sel-fg: #020d19;
        }
      }
      :root.dark {
        --bg: #0b1215;
        --surface: #020d19;
        --fg: #efefef;
        --muted: #99a1af;
        --border: #efefef;
        --accent-hover: #ff8a63;
        --mark: #efefef;
        --sel-bg: #efefef;
        --sel-fg: #020d19;
      }

      /* --- selection --- */
      ::selection {
        background: var(--sel-bg);
        color: var(--sel-fg);
      }
      ::-moz-selection {
        background: var(--sel-bg);
        color: var(--sel-fg);
      }

      html {
        background: var(--bg);
        overscroll-behavior: none;
      }
      body {
        -webkit-font-smoothing: antialiased;
        background: var(--bg);
        color: var(--fg);
        font: 16px/1.4 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        min-height: 100vh;
        padding: 0 0 32px;
      }

      a {
        color: inherit;
      }

      #page-shell {
        display: flex;
        flex-direction: column;
        margin-top: 48px;
        margin-inline: auto;
        max-width: 48rem;
        width: calc(100% - 32px);
      }

      #header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 48px;
      }
      #header nav {
        align-items: center;
        display: flex;
        gap: 24px;
      }
      #home-mark {
        border: 3px solid var(--mark);
        display: block;
        height: 48px;
        padding: 4px;
        position: relative;
        text-decoration: none;
        transition: border-color 0.15s ease;
        width: 48px;
      }
      #home-mark:focus-visible,
      #home-mark:hover {
        border-color: var(--accent);
      }
      #home-mark span {
        background-image:
          linear-gradient(var(--mark), var(--mark)),
          linear-gradient(var(--mark), var(--mark)),
          linear-gradient(var(--mark), var(--mark)),
          linear-gradient(var(--accent), var(--accent));
        background-position:
          0 0,
          0 0,
          0 12px,
          20px 20px;
        background-size:
          8px 28px,
          26px 8px,
          18px 8px,
          8px 8px;
        background-repeat: no-repeat;
        display: block;
        height: 24px;
        left: 9px;
        position: absolute;
        top: 9px;
        width: 24px;
      }
      #theme-toggle {
        all: unset;
        border: 2px solid var(--mark);
        cursor: pointer;
        height: 16px;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
        width: 16px;
      }
      #theme-toggle:hover {
        background: var(--accent);
        border-color: var(--accent);
      }
      #header nav a {
        color: var(--fg);
        cursor: pointer;
        text-decoration: none;
        text-underline-offset: 3px;
        transition: color 0.15s ease;
      }
      #header nav a:hover,
      #header nav a.active {
        color: var(--accent);
        text-decoration: underline;
      }

      #footer {
        align-items: baseline;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-top: 32px;
        color: var(--muted);
        font-size: 12px;
      }
      #footer span {
        user-select: all;
      }
      #footer span:not(:empty)::before {
        content: "updated ";
      }

      #wrapper {
        background: var(--surface);
        min-width: 0;
        padding: 48px;
      }

      #wrapper h1,
      #wrapper h2,
      #wrapper h3,
      #wrapper h4,
      #wrapper h5,
      #wrapper h6 {
        font-size: 16px;
        font-weight: 400;
        line-height: 1.4;
      }
      #wrapper h1,
      #wrapper h2 {
        margin: 0 0 16px;
      }
      #wrapper h2:not(:first-child) {
        margin-top: 48px;
      }
      #wrapper h3 {
        margin: 28px 0 8px;
      }
      #wrapper h4,
      #wrapper h5,
      #wrapper h6 {
        color: var(--muted);
        font-size: 14px;
        margin: 24px 0 8px;
      }

      #wrapper p {
        margin-bottom: 16px;
      }
      #wrapper > p:first-child {
        max-width: 58ch;
      }

      #wrapper strong {
        color: var(--muted);
        font-weight: 400;
      }
      #wrapper p > strong {
        font-size: 12px;
      }

      #wrapper p > code {
        background: none;
        color: var(--muted);
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0;
        padding: 0;
      }

      #wrapper ul,
      #wrapper ol {
        margin: 0 0 16px;
        padding-left: 2ch;
      }
      #wrapper li {
        margin-bottom: 6px;
      }
      #wrapper li::marker {
        color: var(--muted);
      }

      #wrapper a {
        color: var(--accent);
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 2px;
        transition: color 0.15s ease;
      }
      #wrapper a:hover {
        color: var(--accent-hover);
      }

      #wrapper hr {
        border: 0;
        border-top: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
        margin: 24px 0;
      }

      #wrapper blockquote {
        border-left: 2px solid var(--border);
        margin: 24px 0;
        padding-left: 2ch;
      }
      #wrapper blockquote p {
        color: var(--muted);
      }

      #wrapper pre {
        background: var(--fg);
        color: var(--surface);
        font-size: 14px;
        line-height: 1.5;
        margin: 24px 0;
        overflow-x: auto;
        padding: 16px;
      }
      #wrapper pre code {
        background: none;
        color: inherit;
        padding: 0;
        font-size: inherit;
        border: none;
      }
      #wrapper code {
        background: var(--fg);
        color: var(--surface);
        font-size: 0.9em;
        padding: 0.1em 0.4em;
      }

      html[data-route="blog"] #wrapper h3 {
        display: inline;
        margin: 0;
      }
      html[data-route="blog"] #wrapper h3 + p {
        color: var(--muted);
        font-size: 12px;
        margin: 2px 0 8px;
      }
      html[data-route="blog"] #wrapper h3 + p + p {
        color: color-mix(in srgb, var(--fg) 72%, var(--muted));
        margin-bottom: 20px;
      }
      html[data-route="blog"] #wrapper hr {
        margin: 20px 0;
      }

      @media (max-width: 640px) {
        body {
          padding-bottom: 24px;
        }
        #page-shell {
          margin-top: 32px;
        }
        #header {
          align-items: flex-start;
          flex-direction: column;
        }
        #header nav {
          width: 100%;
        }
        #theme-toggle {
          margin-left: auto;
        }
        #wrapper {
          padding: 24px;
        }
        #footer {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="page-shell">
      <header id="header">
        <a id="home-mark" href="/" aria-label="Rustam Ashurmatov home">
          <span aria-hidden="true"></span>
        </a>
        <nav aria-label="Primary">
          <a href="/">Home</a>
          <a href="/blog">Blog</a>
          <a href="/more">More</a>
          <button id="theme-toggle" aria-label="Toggle theme"></button>
        </nav>
      </header>

      <main id="wrapper">
        <!--CONTENT-->
      </main>

      <footer id="footer">
        <span id="last-updated"><!--LAST_UPDATED--></span>
      </footer>
    </div>

    <script type="module">
      const wrapper = document.getElementById("wrapper");
      const favicon = document.getElementById("favicon");

      function faviconHref(fill) {
        return `data:image/svg+xml,${encodeURIComponent(
          `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="32" r="20" fill="${fill}"/></svg>`,
        )}`;
      }

      function syncFavicon() {
        const fill = getComputedStyle(document.documentElement)
          .getPropertyValue("--fg")
          .trim();
        favicon.href = faviconHref(fill);
      }

      function routeName(path) {
        if (path === "/" || path === "/home") return "home";
        if (path === "/blog") return "blog";
        if (path.startsWith("/blog/")) return "post";
        if (path === "/more") return "more";
        return "page";
      }

      (function initTheme() {
        const saved = localStorage.getItem("theme");
        if (saved) document.documentElement.classList.add(saved);
        document.documentElement.dataset.route = routeName(window.location.pathname);
        syncFavicon();
      })();

      document.getElementById("theme-toggle").addEventListener("click", () => {
        const root = document.documentElement;
        const isDark =
          root.classList.contains("dark") ||
          (!root.classList.contains("light") &&
            matchMedia("(prefers-color-scheme: dark)").matches);
        root.classList.remove("dark", "light");
        const next = isDark ? "light" : "dark";
        root.classList.add(next);
        localStorage.setItem("theme", next);
        syncFavicon();
      });

      function setActiveNav(path) {
        document.querySelectorAll("#header nav a").forEach((a) => {
          const href = a.getAttribute("href");
          const isActive =
            href === path ||
            (href === "/" && path === "/home") ||
            (href === "/blog" && path.startsWith("/blog/"));
          a.classList.toggle("active", isActive);
        });
      }
      let pathname = window.location.pathname;
      setActiveNav(pathname);
      let pages = {
        "/": undefined,
        "/blog": undefined,
        "/more": undefined,
      };
      pages[pathname] = wrapper.innerHTML;

      for (const [path, val] of Object.entries(pages)) {
        if (val !== undefined) continue;
        const mdPath = path === "/" ? "/md/home" : "/md" + path;
        fetch(mdPath)
          .then((d) => d.text())
          .then((html) => {
            pages[path] = html;
          });
      }

      function mdPath(path) {
        return path === "/" ? "/md/home" : "/md" + path;
      }

      function render(path, { push } = {}) {
        if (pages[path] !== undefined) {
          wrapper.innerHTML = pages[path];
          if (push) history.pushState(null, "", path);
          return;
        }

        fetch(mdPath(path))
          .then((d) => d.text())
          .then((html) => {
            pages[path] = html;
            wrapper.innerHTML = html;
            if (push) history.pushState(null, "", path);
          });
      }

      function navigate(path, { push = true, scrollTop = true } = {}) {
        document.documentElement.dataset.route = routeName(path);
        setActiveNav(path);
        if (scrollTop) window.scrollTo(0, 0);
        render(path, { push });
      }

      document.getElementById("header").addEventListener("click", (e) => {
        const a = e.target.closest("a");
        if (!a) return;
        e.preventDefault();
        navigate(a.getAttribute("href"));
      });



      window.addEventListener("popstate", () => {
        const path = window.location.pathname;
        navigate(path, { push: false, scrollTop: false });
      });

      wrapper.addEventListener("click", (e) => {
        const a = e.target.closest("a");
        if (!a) return;
        const href = a.getAttribute("href");
        if (!href) return;
        if (href !== "/blog" && !href.startsWith("/blog/")) return;
        e.preventDefault();
        navigate(href);
      });
    </script>
  </body>
</html>
