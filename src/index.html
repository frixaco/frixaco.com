<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="<!--META_DESCRIPTION-->" />
    <title><!--PAGE_TITLE--></title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
      }
      p {
        text-wrap: pretty;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        overflow-wrap: break-word;
        text-wrap: balance;
      }
      img,
      svg {
        display: block;
        max-width: 100%;
      }
      :root {
        --bg: #fbebd9;
        --fg: #321609;
        --m: #8a7260;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #161312;
          --fg: #ffdcba;
          --m: #c5b1a3;
        }
      }
      html {
        overscroll-behavior: none;
      }
      body {
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.6 monospace;
        max-width: 720px;
        min-height: 100vh;
        padding: 0 24px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      #header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 16px 0;
        z-index: 1;
        background: var(--bg);
        position: sticky;
        top: 0;
      }
      #footer {
        display: flex;
        padding: 24px 0 16px;
        justify-content: flex-end;
      }
      #wrapper {
        flex: 1;
      }
      #header nav a:first-child {
        font-weight: bold;
      }
      #header nav {
        display: contents;
      }
      #header nav a,
      #footer span {
        all: unset;
        padding: 2px 16px;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 0.05em;
        background: var(--bg);
        border: 1.5px solid var(--fg);
      }
      #header nav a {
        cursor: pointer;
        transition:
          color 0.15s,
          background 0.15s;
      }
      #header nav a:hover,
      #header nav a.active {
        color: var(--bg);
        background: var(--fg);
      }
      #footer span {
        font-size: 11px;
        color: var(--m);
        border-color: var(--m);
      }
      #wrapper h2 {
        padding: 1.2em 0 0.3em;
        font-size: 1.15em;
      }
      #wrapper h3 {
        padding: 0.8em 0 0.2em;
      }
      #wrapper h4,
      #wrapper h5,
      #wrapper h6 {
        padding: 0.5em 0 0.15em;
        font-size: 0.95em;
        color: var(--m);
      }
      #wrapper p {
        padding-bottom: 0.6em;
      }
      #wrapper ul,
      #wrapper ol {
        padding: 0 0 0.6em 1.5em;
      }
      #wrapper li {
        padding-bottom: 0.3em;
      }
      #wrapper a {
        color: var(--fg);
        text-decoration: underline;
        text-underline-offset: 3px;
        transition:
          color 0.15s,
          background 0.15s;
      }
      #wrapper a:hover {
        background: var(--fg);
        color: var(--bg);
        text-decoration: none;
      }
      #wrapper hr {
        border: none;
        border-bottom: 1px solid var(--fg);
        opacity: 0.12;
        margin: 1.2em 0;
      }
      #wrapper blockquote {
        border-left: 3px solid var(--fg);
        padding: 0.5em 0 0.5em 1em;
        margin: 0.8em 0;
      }
      #wrapper blockquote p {
        color: var(--m);
        font-style: italic;
      }
      #wrapper code,
      #wrapper pre {
        background: var(--fg);
        color: var(--bg);
      }
      #wrapper code {
        padding: 0.1em 0.4em;
        font-size: 0.9em;
      }
      #wrapper pre {
        padding: 1em;
        overflow-x: auto;
        margin: 0.6em 0;
      }
      #wrapper pre code {
        padding: 0;
        font-size: 0.85em;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <header id="header">
      <nav>
        <a href="/">RUSTAM</a>
        <a href="/blog">blog</a>
        <a href="/more">about</a>
      </nav>
    </header>

    <main id="wrapper">
      <!--CONTENT-->
    </main>

    <footer id="footer">
      <span id="last-updated">...</span>
    </footer>

    <script type="module">
      const wrapper = document.getElementById("wrapper");

      function setActiveNav(path) {
        document.querySelectorAll("#header nav a").forEach((a) => {
          const href = a.getAttribute("href");
          const isActive =
            href === path || (href === "/blog" && path.startsWith("/blog/"));
          a.classList.toggle("active", isActive);
        });
      }
      let pathname = window.location.pathname;
      setActiveNav(pathname);
      let pages = {
        "/": undefined,
        "/blog": undefined,
        "/more": undefined,
      };
      pages[pathname] = wrapper.innerHTML;

      for (const [path, val] of Object.entries(pages)) {
        if (val !== undefined) continue;
        const mdPath = path === "/" ? "/md/home" : "/md" + path;
        fetch(mdPath)
          .then((d) => d.text())
          .then((html) => {
            pages[path] = html;
          });
      }

      function mdPath(path) {
        return path === "/" ? "/md/home" : "/md" + path;
      }

      function render(path, { push } = {}) {
        if (pages[path] !== undefined) {
          wrapper.innerHTML = pages[path];
          if (push) history.pushState(null, "", path);
          return;
        }

        fetch(mdPath(path))
          .then((d) => d.text())
          .then((html) => {
            pages[path] = html;
            wrapper.innerHTML = html;
            if (push) history.pushState(null, "", path);
          });
      }

      function navigate(path, { push = true, scrollTop = true } = {}) {
        setActiveNav(path);
        if (scrollTop) window.scrollTo(0, 0);
        render(path, { push });
      }

      document.getElementById("header").addEventListener("click", (e) => {
        const a = e.target.closest("a");
        if (!a) return;
        e.preventDefault();
        navigate(a.getAttribute("href"));
      });

      fetch(
        "https://api.github.com/repos/frixaco/frixaco.com/commits?per_page=1",
      )
        .then((r) => r.json())
        .then(([commit]) => {
          const date = new Date(commit.commit.committer.date);
          document.getElementById("last-updated").textContent =
            "updated " +
            date.toLocaleDateString("en-US", {
              year: "numeric",
              month: "short",
              day: "numeric",
            });
        })
        .catch(() => {
          document.getElementById("last-updated").textContent = "frixaco.com";
        });

      window.addEventListener("popstate", () => {
        const path = window.location.pathname;
        navigate(path, { push: false, scrollTop: false });
      });

      wrapper.addEventListener("click", (e) => {
        const a = e.target.closest("a");
        if (!a) return;
        const href = a.getAttribute("href");
        if (!href) return;
        if (href !== "/blog" && !href.startsWith("/blog/")) return;
        e.preventDefault();
        navigate(href);
      });
    </script>
  </body>
</html>
